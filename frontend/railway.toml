[build]
builder = "railpack"
buildCommand = "rm -rf node_modules package-lock.json && npm cache clean --force && npm install && npm run build"

[deploy]
startCommand = "npm run preview"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.envs]
NODE_ENV = "production"
